discovery_task:
  description: >
    Run the candidate discovery tool first. If auto_discover is false, confirm the
    manually supplied ticker. If auto_discover is true, select the strongest candidate
    with an earnings call inside the next {discovery_window_days} day(s). Return the
    exact selected ticker, earnings date, event text, thesis, and a short handoff.
    If the discovery score is below {discovery_min_score}, explicitly reject the setup
    and automatically retry discovery up to {discovery_retry_attempts} additional
    time(s) with a wider scan before instructing the portfolio manager to hold instead
    of forcing analysis on a weak pick. Every downstream task must use the selected
    ticker from this discovery output only when discovery status is accepted.
    Your final answer must fill the structured JSON fields exactly, including
    selected_ticker, discovery_status, discovery_score, discovery_attempts_used,
    upcoming_event, and thesis.
  expected_output: >
    A markdown discovery memo with the final selected ticker, company, earnings date,
    event, thesis, and explicit instruction for downstream tasks to use that ticker.
  agent: discovery_analyst

research_task:
  description: >
    Call trade_context_tool first to load the persisted discovery JSON. Then use
    the market research tool and the live market data tool to produce a short
    research brief for the selected ticker from structured context. Use the
    selected_ticker, thesis, and upcoming_event from the structured context instead
    of {ticker} whenever they differ. Focus on whether the catalyst and current
    price action support a long, short, or neutral stance.
  expected_output: >
    A markdown research note with thesis, catalyst risk, macro context, and a
    directional leaning.
  agent: market_research_analyst

technical_task:
  description: >
    Call trade_context_tool first to load the persisted discovery JSON. Use the
    selected_ticker from structured context. Fetch live price context and derived
    indicators for that ticker, then use the technical indicator tool with the live
    values to explain whether the setup is bullish, bearish, or mixed.
  expected_output: >
    A markdown technical note with the tool output and a concise directional view.
  agent: technical_analyst

sentiment_task:
  description: >
    Call trade_context_tool first to load the persisted discovery JSON. Use the
    selected_ticker from structured context with the live news sentiment tool.
    Judge whether the latest market-facing headlines support the trade idea or argue
    against it.
  expected_output: >
    A markdown sentiment note with the tool output and a concise directional view.
  agent: sentiment_analyst

options_task:
  description: >
    Call trade_context_tool first to load the persisted discovery JSON. Use the
    selected_ticker and thesis from structured context together with the live
    options chain tool and the options strategy tool to recommend a simple options
    expression based on the directional bias implied by the thesis and current
    volatility assumptions.
  expected_output: >
    A markdown options note with one primary strategy and when not to use it.
  agent: options_strategist

risk_task:
  description: >
    Call trade_context_tool first to load the persisted discovery JSON. Use the
    portfolio state tool together with the risk budget tool. Combine the live
    account context for the selected_ticker from structured context with the
    portfolio value, max position percent, stop loss percent, conviction score,
    and current price. Return a disciplined share count and notional size.
  expected_output: >
    A markdown risk memo with position size, risk limits, and trade invalidation rules.
  agent: risk_manager

backtest_task:
  description: >
    Call trade_context_tool first to load the persisted discovery JSON. Use the
    selected_ticker from structured context to run a simple historical test.
    Summarize whether recent historical behavior supports or weakens confidence in
    the current thesis.
  expected_output: >
    A markdown backtest note with strategy return, benchmark return, win rate,
    drawdown, and what those results imply.
  agent: strategy_backtester

decision_task:
  description: >
    Review the reports from research, technicals, sentiment, options, risk, and
    backtesting.
    Use the selected_ticker and discovery_status fields from discovery_task as the
    final subject under review.
    If discovery_task reports a rejected setup because the score is below
    {discovery_min_score}, the default action must be hold unless another task presents
    a concrete reason to override that rejection. If discovery status is rejected,
    explicitly output final action: hold.
    As the portfolio manager, make the final action for that ticker: buy, sell,
    reduce, or hold. The manager is the only role allowed to make the trade
    decision. Include the reasoning, the confidence level, and the conditions
    that would change the decision. Your final answer must fill the structured JSON
    fields exactly, including ticker, discovery_status, final_action, confidence,
    rationale, and conditions_to_change.
  expected_output: >
    A markdown investment decision memo with final action, confidence, and supporting rationale.
  agent: portfolio_manager

execution_task:
  description: >
    Call trade_context_tool with decision context enabled first so you load the
    persisted discovery and portfolio decision JSON. Then take the approved portfolio
    manager decision and the risk sizing output, then
    use the execution plan tool to create an execution handoff. Respect the
    requested execution mode, broker, order type, and time in force. Do not
    override the manager's decision. If execution mode is paper or live and the
    decision is buy or sell, the tool may submit through Alpaca when the required
    environment variables are present and ALPACA_ENABLE_SUBMISSION=true.
    Use the selected_ticker and discovery_status fields from structured discovery
    context, plus the final_action field from structured decision context. Pass the
    discovery status into the execution plan tool. If the discovery status is
    rejected, the execution handoff must remain hold and no submission may proceed.
  expected_output: >
    A markdown execution handoff showing the final action, share count, execution
    mode, broker note, order details, and whether an API such as Alpaca was used.
  agent: execution_operator
  output_file: output/trade_decision.md
